spring:
  application:
    name: HouseCup
  main:
    banner-mode: off # serve a non generare stampa iniziale quando parte app
  datasource: # quando creiamo app multiutente usiamo connection pool (blocco di conn) instanziate
    # quando parte l'app. Perché nella maggior parte app backend operaz sono abbastanza flash, quindi
    # costa di più aprire e chiudere connessione, quindi ricicliamo connessioni. Astrazione java
    # per un connection pool si chiama datasource
    url: ${DB_URL:jdbc:postgresql://localhost:5432/xchangedb}
    username: ${DB_USER:postgresMaster}
    password: ${DB_PASS:goPostgresGo}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 10 # quante connessioni max nel gruppo
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging: # voglio vedere non solo stringhe sql che verranno lanciate a hibernate ma anche parametri
  # che ci attacca nel prepared statement
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui: # detto anche open api, libreria che fa documentazione automatica di servizi di rest
    path: /swagger-ui.html # questo lo uso per prendere poi la documentazione aprendo il browser e cercando http...
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  jwt:
    issuer: ${JWT_ISSUER:xchangedb}
    secret: ${JWT_SECRET} # lo leggiamo da variabili d'ambiente
    ttl: ${JWT_TTL:PT1H} # ISO-8601 duration (e.g., PT1H = 1 hour)